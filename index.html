<!DOCTYPE html>
<html lang="en">
<head>
  <title>Christian Campbell</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

<div class="splash-bg">
  <header class="splash-header">
    <h1>Christian A. Campbell</h1>
    <p>Software Engineer &nbsp;·&nbsp; Denver, CO</p>
  </header>

  <nav class="card-grid">

    <a href="about.html" class="card card-about">
      <!-- ✏️ To use a real photo: add style="background-image:url('images/your-photo.jpg')" to the div below -->
      <div class="card-bg"></div>
      <div class="card-label">
        <span>01</span>
        <h2>About Me</h2>
      </div>
    </a>

    <a href="resume.html" class="card card-resume">
      <div class="card-bg"></div>
      <div class="card-label">
        <span>02</span>
        <h2>Resume</h2>
      </div>
    </a>

    <a href="notes.html" class="card card-notes">
      <div class="card-bg"></div>
      <div class="card-label">
        <span>03</span>
        <h2>Notes</h2>
      </div>
    </a>

    <a href="projects.html" class="card card-projects">
      <div class="card-bg"></div>
      <div class="card-label">
        <span>04</span>
        <h2>Projects</h2>
      </div>
    </a>

  </nav>
</div>

<div class="cursor"></div>
<script>
  const cursor = document.querySelector('.cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.top  = e.clientY + 'px';
    cursor.style.left = e.clientX + 'px';
  });
  document.addEventListener('click', () => {
    cursor.classList.add('expand');
    setTimeout(() => cursor.classList.remove('expand'), 500);
  });
</script>

</body>
</html>
