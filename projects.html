<!DOCTYPE html>
<html lang="en">
<head>
  <title>Projects — Christian Campbell</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-bg">
  <a href="index.html" class="back-nav">Home</a>

  <div class="projects-container">

    <div class="projects-hero">
      <h1>Projects</h1>
      <p>
        Repositories, experiments, and ongoing builds.<br>
        Pulled live from GitHub.
      </p>
    </div>

    <div class="repos-grid" id="reposGrid">
      <div class="repos-loading">Loading repositories…</div>
    </div>

    <a href="https://github.com/diffior" target="_blank" rel="noopener noreferrer" class="github-card" id="githubCard">
      <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span>View all on GitHub</span>
    </a>

  </div>
</div>

<script>
  fetch('https://api.github.com/users/diffior/repos?sort=updated&per_page=6')
    .then(r => r.json())
    .then(repos => {
      const grid = document.getElementById('reposGrid');
      if (!Array.isArray(repos) || repos.length === 0) {
        grid.innerHTML = '';
        return;
      }
      grid.innerHTML = repos.map(repo => `
        <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="repo-card">
          <div class="repo-name">${repo.name}</div>
          ${repo.description ? `<div class="repo-desc">${repo.description}</div>` : ''}
          <div class="repo-meta">
            ${repo.language ? `<span class="repo-lang">${repo.language}</span>` : ''}
            ${repo.stargazers_count > 0 ? `<span class="repo-stars">★ ${repo.stargazers_count}</span>` : ''}
          </div>
        </a>
      `).join('');
    })
    .catch(() => {
      document.getElementById('reposGrid').innerHTML = '';
    });
</script>

<script data-goatcounter="https://chrisaveri.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
